<h2>Start Quiz</h2>
<p class="muted">Enter your details to begin.</p>

<form (ngSubmit)="submit()">
  <label class="field">
    <span>Name</span>
    <input
      type="text"
      name="name"
      [ngModel]="name()"
      (ngModelChange)="setName($event)"
      placeholder="Your name"
    />

    @if (touchedName() && errors().name) {
    <small class="error">{{ errors().name }}</small>
    }
  </label>

  <label class="field">
    <span>Email</span>
    <input
      type="email"
      name="email"
      [ngModel]="email()"
      (ngModelChange)="setEmail($event)"
      placeholder="you@example.com"
    />

    @if (touchedEmail() && errors().email) {
    <small class="error">{{ errors().email }}</small>
    }
  </label>

  <div class="actions">
    <app-button variant="primary" [disabled]="!isValid()">Start</app-button>
  </div>
</form>
