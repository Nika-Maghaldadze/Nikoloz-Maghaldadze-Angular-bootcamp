@if (!question) {
<p class="muted">No question found.</p>
} @else {
<h3>{{ question.text }}</h3>
<p class="muted">Points: {{ question.points }}</p>

@if (question.type === 'single') {
<div class="choices" role="radiogroup" [attr.aria-label]="question.text">
  @for (choice of question.choices; track choice.id) {
  <label class="choice">
    <input type="radio" [value]="choice.id" [formControl]="singleCtrl" />
    <span>{{ choice.text }}</span>
  </label>
  }
</div>
} @else {
<div class="choices" [attr.aria-label]="question.text">
  @for (choice of question.choices; track choice.id) {
  <label class="choice">
    <input
      type="checkbox"
      [checked]="multiValue.includes(choice.id)"
      (change)="toggleMulti(choice.id)"
    />
    <span>{{ choice.text }}</span>
  </label>
  }
</div>
}

<div class="actions">
  <app-button variant="ghost" (click)="goBack.emit()">Back</app-button>
  <app-button variant="primary" [disabled]="!canSubmit" (click)="submit()">Next</app-button>
</div>
}
