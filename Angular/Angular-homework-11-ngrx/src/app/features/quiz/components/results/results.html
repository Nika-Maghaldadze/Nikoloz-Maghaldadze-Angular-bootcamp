<div class="celebrate">🎉</div>
<h2>Nice work!</h2>

@if (user()) {
<div class="user-card">
  <div class="avatar">{{ user()!.name.charAt(0) || '?' }}</div>
  <div class="meta">
    <b>{{ user()!.name }}</b>
    <span class="muted">{{ user()!.email }}</span>
  </div>
</div>
} @else {
<p class="muted">No user data.</p>
}

<div class="score">
  <span class="label">Your score</span>
  <span class="value">{{ displayScore() }}</span>
</div>

<div class="actions">
  <app-button variant="primary" (click)="restart.emit()">Play again</app-button>
</div>
