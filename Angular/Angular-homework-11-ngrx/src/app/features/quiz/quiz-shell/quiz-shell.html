<div class="page">
  <div class="card">
    @if (vm$ | async; as vm) {
    <app-progress-bar [value]="vm.progress"></app-progress-bar>

    @if (vm.loading) {
    <div class="loading"><span class="spinner"></span> Loading quiz…</div>
    } @else if (vm.error) {
    <p class="error">Failed to load quiz: {{ vm.error }}</p>
    } @else if (vm.view === 'INTRO') {
    <app-intro [savedUser]="vm.user" (submitUser)="onUserSubmit($event)"></app-intro>
    } @else if (vm.view === 'QUESTION') {
    <app-question-card
      [question]="vm.question"
      [existingAnswer]="vm.answer"
      (goBack)="onPrev()"
      (submitAnswer)="onAnswer($event)"
    ></app-question-card>
    } @else if (vm.view === 'RESULTS') {
    <app-results [user]="vm.user" [score]="vm.score" (restart)="onRestart()"></app-results>
    } }
  </div>
</div>
