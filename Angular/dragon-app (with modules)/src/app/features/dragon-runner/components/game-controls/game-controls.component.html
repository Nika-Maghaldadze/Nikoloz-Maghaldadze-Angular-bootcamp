<footer class="controls">
  <div class="controls-row">
    <button class="btn primary" (click)="engine.startOrJump()">
      <ng-container *ngIf="store.isReady">Start / Jump</ng-container>
      <ng-container *ngIf="!store.isReady && !store.isOver">Jump</ng-container>
      <ng-container *ngIf="store.isOver">Restart</ng-container>
    </button>

    <button
      class="btn"
      (mousedown)="engine.duck(true)"
      (mouseup)="engine.duck(false)"
      (mouseleave)="engine.duck(false)"
      (touchstart)="engine.duck(true); $event.preventDefault()"
      (touchend)="engine.duck(false); $event.preventDefault()"
      [disabled]="!store.isRunning"
    >
      Duck
    </button>

    <button class="btn" (click)="engine.pauseOrResume()" [disabled]="store.isReady || store.isOver">
      <ng-container *ngIf="store.isPaused">Resume</ng-container>
      <ng-container *ngIf="!store.isPaused">Pause</ng-container>
    </button>

    <button class="btn danger" (click)="engine.fullRestart()">Restart</button>
  </div>

  <div class="controls-row config">
    <label>
      Timer (sec)
      <input
        type="number"
        min="5"
        max="300"
        [value]="store.timerInputSec()"
        (input)="store.timerInputSec.set($any($event.target).valueAsNumber || 30)"
      />
    </label>

    <label>
      Difficulty
      <select
        [value]="store.difficulty()"
        (change)="engine.onDifficultyChange($any($event.target).value)"
      >
        <option value="easy">Easy</option>
        <option value="normal">Normal</option>
        <option value="hard">Hard</option>
      </select>
    </label>

    <div class="hint">Changing <b>Timer</b> or <b>Difficulty</b> restarts the game immediately</div>
  </div>
</footer>
