<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../css/main.css" />
        <title>Personal project SASS</title>
    </head>
    <body>
        <iframe
            src="./layouts/header.html"
            title="site header"
            scrolling="no"
            frameborder="0"
            >></iframe
        >
        <main class="main-content__wrapper">
            <section class="hero-section__wrapper">
                <div class="hero-section__container">
                    <div class="hero-section__left-container">
                        <h1 class="hero-section__header">
                            Artisan Pastries Made with Love
                        </h1>
                        <p class="hero-section__description">
                            Discover our handcrafted pastries, made fresh daily
                            with the finest ingredients. From flaky croissants
                            to decadent éclairs, every bite is pure bliss.
                        </p>
                        <div class="shop__now-view__menu">
                            <button class="shop-now__button">Shop Now</button>
                            <button class="view-menu__button">View Menu</button>
                        </div>
                    </div>
                    <div class="hero-section__right-container">
                        <img
                            src="./images/photos/foodforsale.png"
                            alt="beautiful artisan pastries display case with croissants, eclairs, and macarons in warm bakery lighting"
                        />
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
