<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
            rel="stylesheet"
        />
        <title>Our Pastries</title>
        <link rel="stylesheet" href="../../css/main.css" />
    </head>
    <body>
        <iframe
            class="iframe-header"
            src="../layouts/header.html"
            title="site header"
            scrolling="no"
            frameborder="0"
            >></iframe
        >
        <main class="main-wrapper">
            <section class="our-pastries__wrapper">
                <div class="our-pastries__container">
                    <h1 class="our-pastries__container-header">Our Pastries</h1>
                    <h4 class="our-pastries__container-paragraph">
                        Discover our exquisite collection of handcrafted
                        pastries, each made with premium ingredients and
                        traditional techniques passed down through generations.
                    </h4>
                </div>
            </section>
            <section class="filters">
                <div class="filters__group">
                    <span class="filters__label">Filter by Category:</span>
                    <div class="filters__buttons">
                        <button class="filter-btn active">All</button>
                        <button class="filter-btn">Croissants</button>
                        <button class="filter-btn">Éclairs</button>
                        <button class="filter-btn">Danish</button>
                        <button class="filter-btn">Macarons</button>
                        <button class="filter-btn">Tarts</button>
                    </div>
                </div>

                <div class="filters__group">
                    <span class="filters__label">Price Range:</span>
                    <button class="filter-select">All Prices</button>
                </div>

                <div class="filters__group">
                    <span class="filters__label">Sort by:</span>
                    <button class="filter-select">Featured</button>
                </div>
            </section>
        </main>
    </body>
</html>
