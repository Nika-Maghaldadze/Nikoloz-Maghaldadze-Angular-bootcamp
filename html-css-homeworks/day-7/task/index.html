<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Day7 Responsive</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles/reset.css" />
        <link rel="stylesheet" href="./styles/styles.css" />
        <link rel="stylesheet" href="./styles/media.css" />
        <link rel="stylesheet" href="./styles/animations.css">
    </head>
    <body>
        <!--! main header -->
        <header class="main-header">
            <!-- ! ანიმაციები ყველაფერს -->
            <div class="header-container">
                <h2 class="logo-text">VIBRANTSTUDIO</h2>
                <nav class="header-navigation">
                    <ul class="nav-ul">
                        <li class="list-item">Home</li>
                        <li class="list-item">About</li>
                        <li class="list-item">Services</li>
                        <li class="list-item">Contact</li>
                    </ul>
                </nav>
            </div>
        </header>
        <!--! main section -->
        <main class="main-section">
            <section class="hero-section">
                <div class="red-circle"></div>
                <div class="blue-circle"></div>
                <div class="yellow-circle"></div>
                <div class="info-wrapper">
                    <!--! ამ სექციას ედება ანიმაცია -->
                    <div class="header-wrapper">
                        <!--! აქ მეტი იდეა არ მქონდა როგორ გამესტილა ორი სიტყვა განსხვავებულად -->
                        <h1 class="main-section__header">
                            <span class="lb-header"> CREATIVE </span>
                            <span class="p-header"> EXPLOSION </span>
                        </h1>
                    </div>
                    <p class="slogan">
                        Where colors dance and imagination comes alive
                    </p>
                    <button class="explore-btn">Explore Magic</button>
                </div>
            </section>
            <section></section>
            <section></section>
            <section></section>
        </main>
        <!--! footer -->
        <footer></footer>
    </body>
</html>
