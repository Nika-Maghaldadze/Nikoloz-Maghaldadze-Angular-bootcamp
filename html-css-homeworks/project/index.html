<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <meta
            name="description"
            content="Buy, sell, and trade luxury and everyday cars. My personal project connects buyers and sellers with secure listings and best-price deals."
        />
        <meta
            name="keywords"
            content="car, luxury, buy, sell, low-price, best-quality, used cars, car marketplace"
        />
        <meta
            name="robots"
            content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
        />
        <meta property="og:site_name" content="Personal project" />
        <meta property="og:title" content="Buy & Sell Luxury Cars" />
        <meta
            property="og:description"
            content="Secure car marketplace for buying and selling luxury & used cars — verified listings, competitive prices, and trusted sellers."
        />
        <meta
            property="og:image:alt"
            content="Luxury car for sale at Personal project"
        />
        <title>Personal Project</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./styles/reset.css" />
        <link rel="stylesheet" href="./styles/main-page.css" />
        <link rel="stylesheet" href="./styles/media.css" />
        <link rel="stylesheet" href="./styles/components.css" />
    </head>
    <body>
        <div class="shadow"></div>
        <header class="main-header">
            <div class="main-header__logo">
                <div class="main-header__img">
                    <img
                        src="./assets/logos/variant=1.svg"
                        alt="white car svg"
                    />
                </div>
                <div class="main-header__header">
                    <h2 class="autodealer-text">AutoDealer</h2>
                </div>
            </div>
            <nav class="main-header__navigation">
                <ul class="navigation-ul">
                    <li class="navigation-list__item">Home</li>
                    <li class="navigation-list__item">Inventory</li>
                    <li class="navigation-list__item">Finance</li>
                    <li class="navigation-list__item">About</li>
                    <li class="navigation-list__item">Contact</li>
                </ul>
            </nav>
            <div class="buttons-wrapper">
                <div class="logos-wrap">
                    <div class="magnifying-glass">
                        <img
                            src="./assets/logos/variant=3.svg"
                            alt="magnifying glass icon"
                        />
                    </div>
                    <div class="heart">
                        <img src="./assets/logos/variant=5.svg" alt="" />
                    </div>
                </div>
                <button class="sign-in__button" type="button">Sign In</button>
            </div>
        </header>
        <main class="main-container">
            <section class="hero-section">
                <div class="content-wrapper">
                    <div class="left-content">
                        <h1 class="hero-section__header">
                            Find Your <br />
                            <span class="purple-header">Perfect</span> Car
                            <br />
                            Today
                        </h1>
                        <p class="hero-section__description">
                            Browse thousands of quality vehicles from trusted
                            dealers. Get the best deals on new and used cars
                            with our advanced search technology.
                        </p>
                        <div class="hero-section__buttons">
                            <button class="hero-section__button purple">
                                <img
                                    src="./assets/logos/variant=12.svg"
                                    alt="white magnifying glass"
                                />
                                Browse Cars
                            </button>
                            <button class="hero-section__button white">
                                <img
                                    src="./assets/logos/variant=14.svg"
                                    alt="grey dollar logo"
                                />
                                Sell Your Car
                            </button>
                        </div>
                    </div>
                    <div class="right-content">
                        <figure class="image-container">
                            <img
                                src="./assets/images/luxury sports car on modern showroom floor with dramatic lighting.png"
                                alt="Luxury sports car on a modern showroom floor"
                                loading="lazy"
                            />
                        </figure>
                    </div>
                </div>
            </section>
            <section class="search-card-wrapper" aria-label="Search cars">
                <div class="search-card">
                    <div class="search-card__header">
                        <span class="search-card__icon" aria-hidden="true">
                            <img src="./assets/logos/Component6.svg" alt="filter icon">
                        </span>

                        <h2 class="search-card__title">Search Cars</h2>
                    </div>

                    <form
                        class="search-form"
                        role="search"
                        aria-label="Car search form"
                        action="/search"
                        method="GET"
                    >
                        <div class="search-form__grid">
                            <div class="field">
                                <label for="make">Make</label>
                                <select
                                    id="make"
                                    name="make"
                                    class="input"
                                    aria-label="Select car make"
                                >
                                    <option value="">All Makes</option>
                                    <option value="toyota">Toyota</option>
                                    <option value="bmw">BMW</option>
                                    <option value="mercedes">Mercedes</option>
                                </select>
                            </div>

                            <div class="field">
                                <label for="model">Model</label>
                                <select
                                    id="model"
                                    name="model"
                                    class="input"
                                    aria-label="Select car model"
                                >
                                    <option value="">All Models</option>
                                    <option value="series-3">Series 3</option>
                                    <option value="c-class">C-Class</option>
                                    <option value="corolla">Corolla</option>
                                </select>
                            </div>

                            <div class="field">
                                <label for="price">Price Range</label>
                                <select
                                    id="price"
                                    name="price"
                                    class="input"
                                    aria-label="Select price range"
                                >
                                    <option value="">Any Price</option>
                                    <option value="0-20000">$0–$20k</option>
                                    <option value="20000-50000">
                                        $20k–$50k
                                    </option>
                                    <option value="50000+">$50k+</option>
                                </select>
                            </div>

                            <div class="field field--button">
                                <button
                                    type="submit"
                                    class="btn-search"
                                    aria-label="Search"
                                >
                                    <svg
                                        width="18"
                                        height="18"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        aria-hidden="true"
                                        focusable="false"
                                    >
                                        <path
                                            d="M21 21l-4.35-4.35"
                                            stroke="white"
                                            stroke-width="1.6"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                        />
                                        <circle
                                            cx="11"
                                            cy="11"
                                            r="6"
                                            stroke="white"
                                            stroke-width="1.6"
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                        />
                                    </svg>
                                    <span class="btn-search__text">Search</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </body>
</html>
